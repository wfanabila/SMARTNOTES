<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC230 Semester Notes - UiTMNoteLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/csc230notes.css">
</head>
<body>
    <header class="page-header">
        <div class="brand-group">
            <img src="img/logo.PNG" alt="UiTMNoteLink Logo" class="brand-logo">
        </div>

        <nav class="main-nav">
            <a href="landingpage.html" class="main-nav__link">Home</a>
            <a href="csc230notes.html" class="main-nav__link main-nav__link--active">Notes</a>
            <a href="help_center.html" class="main-nav__link">Contributors</a>
            <a href="user_dashboard.html" class="main-nav__link">Dashboard</a>
        </nav>
    </header>

    <main class="page-content">
        <section class="hero-panel">
            <div class="hero-title-group">
                <h1 class="hero-title" id="semester-heading">CSC230 SEM 1 Notes</h1>
                <p class="hero-subtitle">Interface view for CSC230 semester notes; this can later connect to backend data.</p>
            </div>
        </section>

        <section class="recent-section">
            <h2 id="listing-title">Available notes for SEM 1</h2>
            <div class="recent-grid" id="notes-grid"></div>
        </section>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const semester = params.get('semester') || '1';
        const semLabel = semester.match(/^[1-6]$/) ? semester : '1';

        const notesBySemester = {
            '1': [
                { id: 611, thumb: 'img/bookmark1.png', title: 'CSC230 Chapter 1', subtitle: 'Computer Architecture Basics' },
                { id: 612, thumb: 'img/bookmark2.png', title: 'CSC230 Chapter 2', subtitle: 'Binary and Logic' },
                { id: 613, thumb: 'img/bookmark3.png', title: 'CSC230 Study Notes', subtitle: 'Hardware concepts explained' }
            ],
            '2': [
                { id: 614, thumb: 'img/bookmark1.png', title: 'CSC230 Chapter 3', subtitle: 'CPU and Memory Systems' },
                { id: 615, thumb: 'img/bookmark2.png', title: 'CSC230 Lab Notes', subtitle: 'Processor design overview' },
                { id: 616, thumb: 'img/bookmark3.png', title: 'CSC230 Exam Prep', subtitle: 'Key revision topics' }
            ],
            '3': [
                { id: 617, thumb: 'img/bookmark1.png', title: 'CSC230 Chapter 4', subtitle: 'Data representation' },
                { id: 618, thumb: 'img/bookmark2.png', title: 'CSC230 Tutorial', subtitle: 'Practical examples' },
                { id: 619, thumb: 'img/bookmark3.png', title: 'CSC230 Notes Pack', subtitle: 'Important formulas' }
            ],
            '4': [
                { id: 620, thumb: 'img/bookmark1.png', title: 'CSC230 Chapter 5', subtitle: 'System organisation' },
                { id: 621, thumb: 'img/bookmark2.png', title: 'CSC230 Group Work', subtitle: 'Project reference notes' },
                { id: 622, thumb: 'img/bookmark3.png', title: 'CSC230 Study Guide', subtitle: 'Full topic summary' }
            ],
            '5': [
                { id: 623, thumb: 'img/bookmark1.png', title: 'CSC230 Chapter 6', subtitle: 'Performance metrics' },
                { id: 624, thumb: 'img/bookmark2.png', title: 'CSC230 Bonus Notes', subtitle: 'Advanced hardware topics' },
                { id: 625, thumb: 'img/bookmark3.png', title: 'CSC230 Revision Pack', subtitle: 'Exam ready notes' }
            ],
            '6': [
                { id: 626, thumb: 'img/bookmark1.png', title: 'CSC230 Final Notes', subtitle: 'Complete course review' },
                { id: 627, thumb: 'img/bookmark2.png', title: 'CSC230 Cheat Sheet', subtitle: 'Important definitions' },
                { id: 628, thumb: 'img/bookmark3.png', title: 'CSC230 Revision Guide', subtitle: 'Top exam tips' }
            ]
        };

        const notes = notesBySemester[semLabel] || notesBySemester['1'];
        document.getElementById('semester-heading').textContent = `CSC230 SEM ${semLabel} Notes`;
        document.getElementById('listing-title').textContent = `Available notes for SEM ${semLabel}`;

        const grid = document.getElementById('notes-grid');
        grid.innerHTML = notes.map(note => `
                <article class="recent-card">
                    <a href="display_note.php?note=${note.id}" class="recent-card__link">
                        <img src="${note.thumb}" alt="${note.title}" class="recent-card__thumb">
                        <div class="recent-card__meta">${note.title}</div>
                        <div class="recent-card__meta" style="font-weight: 500; color: #475569; font-size: 0.95rem; padding-top: 0;">${note.subtitle}</div>
                    </a>
                </article>
            `).join('');
    </script>
</body>
</html>
